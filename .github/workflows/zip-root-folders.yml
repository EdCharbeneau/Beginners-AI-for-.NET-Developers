name: Zip Root Folders

permissions:
  contents: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  discover-folders:
    runs-on: ubuntu-latest

    outputs:
      folders: ${{ steps.find-folders.outputs.folders }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find top-level folders to zip
        id: find-folders
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Get-Location

          $folders = Get-ChildItem -Path $root -Directory |
            Where-Object {
              $_.Name -ne 'scripts' -and
              -not $_.Name.StartsWith('.')
            } |
            Select-Object -ExpandProperty Name

          if (-not $folders) {
            Write-Host 'No folders matched the zip criteria.'
            $json = '["__none__"]'
          } else {
            $json = @($folders) | ConvertTo-Json -Compress
          }

          "folders=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  zip-and-upload:
    needs: discover-folders
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.discover-folders.outputs.folders) }}

    steps:
      - name: Checkout
        if: matrix.folder != '__none__'
        uses: actions/checkout@v4

      - name: Create zip for folder
        id: create-zip
        if: matrix.folder != '__none__'
        env:
          FOLDER_NAME: ${{ matrix.folder }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $folderName = $env:FOLDER_NAME
          $folderPath = Join-Path (Get-Location) $folderName
          $outputDir = Join-Path (Get-Location) 'zips'
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $safeName = ($folderName -replace '[\\/:*?"<>|]', '_')
          $zipPath = Join-Path $outputDir ("$safeName.zip")

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $folderPath '*') -DestinationPath $zipPath -Force
          Write-Host "Created $zipPath"

          $artifactName = "folder-zip-$safeName"
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload zip artifact
        if: matrix.folder != '__none__'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-zip.outputs.artifact_name }}
          path: ${{ steps.create-zip.outputs.zip_path }}
          if-no-files-found: error

  create-release:
    needs: zip-and-upload
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download all folder zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: folder-zip-*
          path: release-assets
          merge-multiple: true

      - name: Build release metadata
        id: release-meta
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $timestamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $tag = "zips-$timestamp"
          $name = "Root Folder Zips $timestamp"

          $files = Get-ChildItem -Path 'release-assets' -File -Filter '*.zip' | Sort-Object Name
          if (-not $files) {
            throw 'No zip files were downloaded for release creation.'
          }

          $bodyPath = Join-Path (Get-Location) 'release-notes.md'
          "Automated zip release for commit $env:GITHUB_SHA`n" | Out-File -FilePath $bodyPath -Encoding utf8
          "Included files:" | Out-File -FilePath $bodyPath -Encoding utf8 -Append
          foreach ($file in $files) {
            $sizeKB = [math]::Round($file.Length / 1KB, 2)
            "- $($file.Name) ($sizeKB KB)" | Out-File -FilePath $bodyPath -Encoding utf8 -Append
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "body_path=$bodyPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create release and upload zips
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          name: ${{ steps.release-meta.outputs.name }}
          body_path: ${{ steps.release-meta.outputs.body_path }}
          files: release-assets/*.zip
